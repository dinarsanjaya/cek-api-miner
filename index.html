<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartbeat Monitor — MineWork</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2128;
  --border: #21262d;
  --border2: #30363d;
  --text: #c9d1d9;
  --text2: #8b949e;
  --text3: #484f58;
  --green: #3fb950;
  --green-dim: rgba(63,185,80,.10);
  --red: #f85149;
  --red-dim: rgba(248,81,73,.10);
  --amber: #d29922;
  --blue: #58a6ff;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --radius: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100dvh;
  padding: 20px;
}

.wrap {
  max-width: 780px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* === TOP BAR === */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  gap: 12px;
  flex-wrap: wrap;
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.pulse-wrap {
  position: relative;
  width: 12px; height: 12px;
  flex-shrink: 0;
}
.pulse-wrap::after {
  content: '';
  position: absolute; inset: -4px;
  border-radius: 50%;
  border: 1.5px solid var(--green);
  animation: ring 1.6s ease-out infinite;
  opacity: 0;
}
#dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--green);
  position: relative; z-index: 1;
  transition: background .3s;
}
.site-name { font-family: var(--sans); font-size: 14px; font-weight: 600; color: #e6edf3; }
.site-url { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.lbl { font-size: 11px; color: var(--text2); white-space: nowrap; }

select, input {
  font-family: var(--mono);
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text);
  outline: none;
}
input:focus, select:focus { border-color: var(--blue); }
#wallet-input { width: 170px; }

.btn {
  font-family: var(--mono);
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  transition: background .15s, border-color .15s;
  white-space: nowrap;
}
.btn:hover { background: var(--bg3); border-color: var(--blue); }
.btn.danger:hover { background: var(--red-dim); border-color: var(--red); color: var(--red); }

/* === STATS === */
.stats {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}
.stat {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 6px;
  position: relative; overflow: hidden;
}
.stat::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent, transparent);
  border-radius: var(--radius) var(--radius) 0 0;
}
.stat.s-total { --accent: var(--blue); }
.stat.s-ok    { --accent: var(--green); }
.stat.s-fail  { --accent: var(--red); }
.stat.s-avg   { --accent: var(--amber); }

.stat-label {
  font-size: 10px; font-weight: 500;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--text2);
}
.stat-val {
  font-size: clamp(20px, 4vw, 26px);
  font-weight: 600; line-height: 1;
  color: #e6edf3;
}
.stat.s-ok .stat-val   { color: var(--green); }
.stat.s-fail .stat-val { color: var(--red); }
.stat.s-avg .stat-val  { color: var(--amber); }

/* === UPTIME BAR === */
.uptime-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.uptime-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
  font-size: 10px; font-weight: 500;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--text2);
}
.uptime-pct { font-size: 12px; font-weight: 600; color: var(--green); letter-spacing: 0; }
.uptime-bar {
  display: flex; gap: 3px; align-items: flex-end; height: 28px;
}
.up-block {
  flex: 1; border-radius: 3px;
  background: var(--border2);
  height: 6px; min-width: 0;
  transition: background .3s, height .3s;
}
.up-block.ok   { background: var(--green); opacity: .8; }
.up-block.fail { background: var(--red); opacity: .8; }

/* === LOG PANEL === */
.log-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.log-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}
.log-head-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text2);
}
#last-status { font-size: 11px; color: var(--text2); }

.log-cols {
  display: grid;
  grid-template-columns: 110px 52px 70px 1fr;
  gap: 8px;
  padding: 6px 16px;
  font-size: 10px; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
}
#log {
  height: clamp(240px, 42vh, 360px);
  overflow-y: auto;
  padding: 6px 8px;
  display: flex; flex-direction: column; gap: 3px;
  scroll-behavior: smooth;
}
#log::-webkit-scrollbar { width: 3px; }
#log::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.placeholder {
  color: var(--text3); font-size: 12px;
  text-align: center; margin: auto; padding: 24px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.log-row {
  display: grid;
  grid-template-columns: 110px 52px 70px 1fr;
  gap: 8px; align-items: center;
  padding: 6px 8px; border-radius: 6px;
  font-size: 12px;
  animation: rowIn .2s ease-out;
}
.log-row.ok      { background: var(--green-dim); }
.log-row.err     { background: var(--red-dim); }
.log-row.timeout { background: rgba(72,79,88,.12); }

.log-ts   { color: var(--text2); font-size: 11px; }
.log-code { font-weight: 600; text-align: center; font-size: 13px; }
.log-code.ok      { color: var(--green); }
.log-code.err     { color: var(--red); }
.log-code.timeout { color: var(--text2); }
.log-ms   { color: var(--text2); font-size: 11px; }
.log-note { font-size: 11px; }
.log-note.ok      { color: #56d364; }
.log-note.err     { color: #ff7b72; }
.log-note.timeout { color: var(--text2); }

/* === FOOTER === */
.footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px; font-size: 11px; color: var(--text2);
  border-top: 1px solid var(--border);
  flex-wrap: wrap; gap: 8px;
}
.cd-badge {
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 4px;
  background: rgba(88,166,255,.10);
  color: var(--blue);
  border: 1px solid rgba(88,166,255,.20);
  min-width: 30px; text-align: center;
  display: inline-block;
}

/* === ANIMATIONS === */
@keyframes ring {
  0%   { transform: scale(1); opacity: .5; }
  100% { transform: scale(2.4); opacity: 0; }
}
@keyframes rowIn {
  from { opacity: 0; transform: translateX(-5px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes beat {
  0%,100% { transform: scale(1); }
  40%     { transform: scale(1.6); }
}
.beating { animation: beat .35s ease-out; }

/* === RESPONSIVE === */
@media (max-width: 560px) {
  body { padding: 12px; }
  .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .log-cols { display: none; }
  .log-row { grid-template-columns: 85px 42px 58px 1fr; font-size: 11px; }
  .site-url { display: none; }
  #wallet-input { width: 130px; }
}
</style>
</head>
<body>

<div class="wrap">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="pulse-wrap"><div id="dot"></div></div>
      <div>
        <div class="site-name">Heartbeat Monitor</div>
        <div class="site-url" id="api-url">https://minework.net/api/miners/...</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="lbl">wallet</span>
      <input id="wallet-input" type="text" placeholder="0x..." value="" />
      <span class="lbl">interval</span>
      <select id="interval-sel">
        <option value="1000">1s</option>
        <option value="5000">5s</option>
        <option value="10000" selected>10s</option>
        <option value="30000">30s</option>
      </select>
      <button class="btn" id="toggle" onclick="toggleMonitor()">⏸ Pause</button>
      <button class="btn danger" onclick="clearLog()">Clear</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat s-total">
      <div class="stat-label">Total</div>
      <div class="stat-val" id="stat-total">0</div>
    </div>
    <div class="stat s-ok">
      <div class="stat-label">Success</div>
      <div class="stat-val" id="stat-ok">0</div>
    </div>
    <div class="stat s-fail">
      <div class="stat-label">Failed</div>
      <div class="stat-val" id="stat-fail">0</div>
    </div>
    <div class="stat s-avg">
      <div class="stat-label">Avg ms</div>
      <div class="stat-val" id="stat-avg">—</div>
    </div>
  </div>

  <!-- UPTIME BAR -->
  <div class="uptime-card">
    <div class="uptime-head">
      <span>Last 60 pings</span>
      <span class="uptime-pct" id="uptime-pct">—</span>
    </div>
    <div class="uptime-bar" id="uptime-bar"></div>
  </div>

  <!-- LOG PANEL -->
  <div class="log-panel">
    <div class="log-head">
      <span class="log-head-label">Live log</span>
      <span id="last-status">—</span>
    </div>
    <div class="log-cols">
      <span>Time</span><span>Code</span><span>Latency</span><span>Status</span>
    </div>
    <div id="log">
      <div class="placeholder"><span>◉</span><span>Waiting for first ping...</span></div>
    </div>
    <div class="footer">
      <div style="display:flex;align-items:center;gap:8px">
        <span>Next ping in</span>
        <span class="cd-badge" id="countdown">—</span>
      </div>
      <span id="uptime-text">uptime: —</span>
    </div>
  </div>

</div>

<script>
const DEFAULT_WALLET = '';
let running = true, timer = null, cdTimer = null;
let total = 0, okCount = 0, failCount = 0, times = [], cdVal = 0;
const HISTORY_SIZE = 60;
let history = [];

function getEndpoint() {
  const w = document.getElementById('wallet-input').value.trim() || DEFAULT_WALLET;
  document.getElementById('api-url').textContent = 'https://minework.net/api/miners/...' + w.slice(-6);
  return 'https://minework.net/api/miners/' + w;
}

function pad(n, l=2) { return String(n).padStart(l, '0'); }
function nowStr() {
  const d = new Date();
  return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds())+'.'+pad(d.getMilliseconds(),3);
}

function renderUptimeBar() {
  const bar = document.getElementById('uptime-bar');
  bar.innerHTML = '';
  const maxH = 24, minH = 6;
  const maxMs = times.length ? Math.max(...times, 1) : 1;
  const slice = history.slice(-HISTORY_SIZE);
  for (let i = 0; i < HISTORY_SIZE; i++) {
    const b = document.createElement('div');
    b.className = 'up-block';
    if (i < slice.length) {
      const e = slice[i];
      if (e.ok) {
        b.classList.add('ok');
        const h = minH + Math.round((e.ms / maxMs) * (maxH - minH));
        b.style.height = Math.min(h, maxH) + 'px';
        b.title = e.ts + ' · ' + e.code + ' · ' + e.ms + 'ms';
      } else {
        b.classList.add('fail');
        b.style.height = maxH + 'px';
        b.title = e.ts + ' · ' + (e.code || 'ERR');
      }
    } else {
      b.style.height = minH + 'px';
    }
    bar.appendChild(b);
  }
  const okN = history.filter(h => h.ok).length;
  const tot = Math.min(history.length, HISTORY_SIZE);
  const pct = tot ? Math.round((okN / tot) * 100) : null;
  const pctEl = document.getElementById('uptime-pct');
  if (pct !== null) {
    pctEl.textContent = pct + '%';
    pctEl.style.color = pct >= 99 ? 'var(--green)' : pct >= 90 ? 'var(--amber)' : 'var(--red)';
  } else {
    pctEl.textContent = '—';
  }
  document.getElementById('uptime-text').textContent =
    pct !== null ? 'uptime: ' + pct + '% (' + tot + ')' : 'uptime: —';
}

function addRow(code, ms, ts) {
  const log = document.getElementById('log');
  const ph = log.querySelector('.placeholder');
  if (ph) ph.remove();
  const is2xx = code >= 200 && code < 300;
  const cls = is2xx ? 'ok' : code === 0 ? 'timeout' : 'err';
  const label = code === 0 ? 'ERR' : code;
  const note = is2xx ? '✓ ok' : code === 0 ? '✕ timeout / error' : '! http ' + code;
  const row = document.createElement('div');
  row.className = 'log-row ' + cls;
  row.innerHTML =
    '<span class="log-ts">' + ts + '</span>' +
    '<span class="log-code ' + cls + '">' + label + '</span>' +
    '<span class="log-ms">' + (ms > 0 ? ms + 'ms' : '—') + '</span>' +
    '<span class="log-note ' + cls + '">' + note + '</span>';
  log.insertBefore(row, log.firstChild);
  if (log.children.length > 200) log.removeChild(log.lastChild);
  const dot = document.getElementById('dot');
  dot.style.background = is2xx ? 'var(--green)' : 'var(--red)';
  dot.classList.remove('beating');
  void dot.offsetWidth;
  dot.classList.add('beating');
  document.getElementById('last-status').textContent =
    'last: ' + label + ' · ' + (ms > 0 ? ms + 'ms' : 'n/a') + ' · ' + ts;
}

function updateStats() {
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-ok').textContent = okCount;
  document.getElementById('stat-fail').textContent = failCount;
  document.getElementById('stat-avg').textContent =
    times.length ? Math.round(times.reduce((a,b)=>a+b,0)/times.length) + 'ms' : '—';
}

function startCountdown() {
  clearInterval(cdTimer);
  const iv = parseInt(document.getElementById('interval-sel').value);
  cdVal = Math.round(iv / 1000);
  document.getElementById('countdown').textContent = cdVal + 's';
  cdTimer = setInterval(() => {
    cdVal = Math.max(0, cdVal - 1);
    document.getElementById('countdown').textContent = cdVal + 's';
  }, 1000);
}

async function ping() {
  if (!running) return;
  const ts = nowStr();
  const t0 = performance.now();
  let code = 0, ms = 0;
  try {
    const r = await fetch(getEndpoint(), { signal: AbortSignal.timeout(12000) });
    ms = Math.round(performance.now() - t0);
    code = r.status;
  } catch(e) {
    ms = Math.round(performance.now() - t0);
    code = 0;
  }
  const is2xx = code >= 200 && code < 300;
  total++;
  if (is2xx) { okCount++; times.push(ms); if (times.length > 100) times.shift(); }
  else failCount++;
  history.push({ ok: is2xx, code, ms, ts });
  if (history.length > HISTORY_SIZE + 10) history.shift();
  addRow(code, ms, ts);
  updateStats();
  renderUptimeBar();
  scheduleNext();
}

function scheduleNext() {
  if (!running) return;
  const iv = parseInt(document.getElementById('interval-sel').value);
  startCountdown();
  timer = setTimeout(ping, iv);
}

function toggleMonitor() {
  running = !running;
  const btn = document.getElementById('toggle');
  const dot = document.getElementById('dot');
  btn.textContent = running ? '⏸ Pause' : '▶ Resume';
  if (running) {
    dot.style.background = 'var(--green)';
    ping();
  } else {
    clearTimeout(timer); clearInterval(cdTimer);
    document.getElementById('countdown').textContent = '—';
    dot.style.background = 'var(--text3)';
  }
}

function clearLog() {
  document.getElementById('log').innerHTML =
    '<div class="placeholder"><span>◉</span><span>Waiting for first ping...</span></div>';
  total = 0; okCount = 0; failCount = 0; times = []; history = [];
  updateStats(); renderUptimeBar();
  document.getElementById('last-status').textContent = '—';
}

document.getElementById('interval-sel').addEventListener('change', () => {
  clearTimeout(timer); clearInterval(cdTimer);
  if (running) ping();
});
document.getElementById('wallet-input').addEventListener('change', getEndpoint);

getEndpoint();
renderUptimeBar();
ping();
</script>
</body>
</html>
